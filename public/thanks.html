<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせありがとうございます｜ゼイリAI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif; background: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: white; border-radius: 24px; padding: 64px 48px; text-align: center; max-width: 520px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
    .icon { font-size: 4rem; margin-bottom: 24px; }
    h1 { font-size: 1.8rem; font-weight: 900; color: #1A3A6A; margin-bottom: 16px; }
    p { color: #7f8c8d; line-height: 1.8; margin-bottom: 8px; }
    .back { display: inline-block; margin-top: 32px; background: #1A3A6A; color: white; padding: 14px 36px; border-radius: 50px; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>お問い合わせありがとうございます</h1>
    <p>内容を確認の上、通常1営業日以内にご返信いたします。</p>
    <p>しばらくお待ちください。</p>
    <a href="/" class="back">トップに戻る</a>
  </div>
</body>
</html>
