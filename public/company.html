<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>運営会社｜ゼイリAI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      color: #2c3e50; background: #f8fafc; line-height: 1.8;
    }
    header {
      background: #1A3A6A; padding: 16px 40px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { color: white; font-size: 1.4rem; font-weight: 900; text-decoration: none; }
    .logo span { color: #f39c12; }
    .back-link { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.88rem; }
    .back-link:hover { color: white; }
    .container { max-width: 800px; margin: 48px auto; padding: 0 24px 80px; }
    h1 { font-size: 1.8rem; font-weight: 900; color: #1A3A6A; margin-bottom: 40px; }
    .card {
      background: white; border-radius: 16px; padding: 40px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    }
    table { width: 100%; border-collapse: collapse; }
    tr { border-bottom: 1px solid #f0f4f8; }
    tr:last-child { border-bottom: none; }
    th {
      width: 160px; padding: 20px 16px; text-align: left;
      font-size: 0.88rem; font-weight: 700; color: #1A3A6A;
      vertical-align: top; white-space: nowrap;
    }
    td { padding: 20px 16px; font-size: 0.93rem; color: #4a5568; }
    a { color: #2563a8; }
    @media (max-width: 600px) {
      header { padding: 14px 20px; }
      .card { padding: 24px 16px; }
      h1 { font-size: 1.4rem; }
      table, tbody, tr, th, td { display: block; }
      th { padding: 16px 0 4px; border-bottom: none; color: #7f8c8d; font-size: 0.8rem; }
      td { padding: 0 0 16px; }
    }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo">ゼイリ<span>AI</span></a>
    <a href="/" class="back-link">← トップに戻る</a>
  </header>

  <div class="container">
    <h1>運営会社</h1>
    <div class="card">
      <table>
        <tr>
          <th>会社名</th>
          <td>合同会社エスコネクト</td>
        </tr>
        <tr>
          <th>代表者</th>
          <td>桜井 謙司</td>
        </tr>
        <tr>
          <th>設立</th>
          <td>2017年5月2日</td>
        </tr>
        <tr>
          <th>所在地</th>
          <td>〒530-0001<br>大阪府大阪市北区梅田１丁目２番2号<br>大阪駅前第２ビル 12F-12</td>
        </tr>
        <tr>
          <th>事業内容</th>
          <td>ITサービスの企画・開発・提供<br>AIソリューションの開発・運営</td>
        </tr>
        <tr>
          <th>お問い合わせ</th>
          <td><a href="mailto:info@lp.sconnect.co.jp">info@lp.sconnect.co.jp</a><br>
          <span style="font-size:0.85rem;color:#7f8c8d;">受付時間：平日 10:00〜18:00</span></td>
        </tr>
        <tr>
          <th>サービス</th>
          <td><a href="/">ゼイリAI</a>｜税理士・会計事務所向け LINE AIアシスタント</td>
        </tr>
      </table>
    </div>
  </div>
</body>
</html>
